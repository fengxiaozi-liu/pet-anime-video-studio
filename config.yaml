app:
  debug: false
  data_dir: ".data"
  upload_dir: "uploads"
  output_dir: "outputs"

database:
  driver: "sqlite"
  sqlite:
    path: ".data/tasks.db"
  mysql:
    host: "127.0.0.1"
    port: 3306
    db: "petclip"
    user: "root"
    password: ""

storage:
  provider: "local"
  local:
    base_dir: "uploads/assets"
    public_base_url: "http://127.0.0.1:8000/media"

providers:
  jimeng:
    enabled: false
    app_key: ""
    app_secret: ""
    req_key: "jimeng_ti2v_v30_pro"
    base_url: "https://visual.volcengineapi.com"
    mock_mode: false

story_assistants:
  default:
    display_name: "默认故事助手"
    enabled: false
    sort_order: 100
    description: "OpenAI 兼容的故事与分镜生成助手"
    protocol: "openai"
    base_url: "https://api.openai.com/v1"
    api_key: ""
    model: "gpt-4o-mini"
    system_prompt: ""
    temperature: 0.7

worker:
  poll_interval_s: 2.0
  max_retry: 20
  compose_enabled: true
