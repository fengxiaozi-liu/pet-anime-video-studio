<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PetClip Config Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body data-page="providers" class="page-providers">
    <div class="settings-shell">
      <header class="settings-header">
        <div class="settings-header__brand">
          <a class="topbar-back topbar-back--settings" href="/">
            <span>←</span> 返回首页
          </a>
          <div class="settings-header__title">
            <div class="eyebrow">Settings</div>
            <h1>配置中心</h1>
          </div>
        </div>
        <div class="settings-header__actions">
          <a class="topbar-link" href="/studio">工作台</a>
          <a class="topbar-link" href="/tasks">任务列表</a>
        </div>
      </header>

      <main class="settings-main">
        <div class="settings-primary-tabs">
          <button class="settings-primary-tab is-active" data-config-tab="providers" type="button">视频助手</button>
          <button class="settings-primary-tab" data-config-tab="assistants" type="button">故事助手</button>
          <button class="settings-primary-tab" data-config-tab="materials" type="button">素材配置</button>
        </div>

        <section class="settings-layout">
          <aside class="settings-sidebar">
            <div class="settings-sidebar__title" id="config_sidebar_title">视频助手</div>
            <nav class="settings-sidebar__nav" id="config_sidebar_nav"></nav>
          </aside>

          <section class="settings-content">
            <div class="settings-content__header">
              <div>
                <h2 id="config_content_title">视频助手</h2>
                <p id="config_content_description">管理视频生成能力的启用状态、鉴权信息与默认请求参数。</p>
              </div>
              <div class="settings-content__actions">
                <button id="providers_refresh" class="btn btn--ghost" type="button">刷新配置</button>
                <button id="story_assistants_refresh" class="btn btn--ghost" type="button" hidden>刷新助手</button>
                <button id="materials_refresh" class="btn btn--ghost" type="button" hidden>刷新素材</button>
              </div>
            </div>

            <div id="providers_list" class="providers-list"></div>
            <div id="materials_config_panel" class="materials-config-panel" hidden></div>
          </section>
        </section>
      </main>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
