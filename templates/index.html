<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PetClip Studio</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="brand__title">PetClip Studio</div>
        <div class="brand__sub muted">工作台（MVP）：左上配置 / 左下素材 / 右侧输出</div>
      </div>
      <div class="topbar__actions">
        <button id="submit" class="btn-primary">生成视频</button>
      </div>
    </header>

    <main class="workspace">
      <aside class="sidebar">
        <section class="panel panel--config">
          <div class="panel__head">
            <div class="panel__title">配置</div>
            <div class="panel__desc muted">平台模板 / 模型 / 参数</div>
          </div>

          <label>平台（占位）</label>
          <select id="platform" disabled>
            <option selected>抖音（9:16）</option>
            <option>小红书（9:16）</option>
            <option>视频号</option>
            <option>B站</option>
          </select>

          <label>Prompt</label>
          <textarea id="prompt" rows="3" placeholder="描述风格/剧情...">A cozy hand-drawn anime scene with a small pet hero, watercolor backgrounds, gentle lighting.</textarea>

          <label>Storyboard JSON（可选）</label>
          <textarea id="storyboard" rows="6" placeholder='{"scenes":[{"duration_s":5,"prompt":"..."}]}'></textarea>

          <div class="grid2">
            <div>
              <label>Backend</label>
              <select id="backend">
                <option value="auto" selected>auto（云优先→本地兜底）</option>
                <option value="local">local（本地）</option>
                <option value="cloud">cloud（云）</option>
              </select>
            </div>
            <div>
              <label>Provider</label>
              <select id="provider">
                <option value="kling" selected>kling（可灵）</option>
                <option value="gemini">gemini</option>
                <option value="doubao">doubao（豆包）</option>
                <option value="openai">openai</option>
              </select>
            </div>
          </div>

          <div class="grid2">
            <label class="checkbox">
              <input id="subtitles" type="checkbox" checked />
              <span>字幕</span>
            </label>
            <div>
              <label>BGM Volume</label>
              <input id="bgm_volume" type="number" value="0.25" step="0.05" min="0" max="2" />
            </div>
          </div>

          <label>BGM（可选）</label>
          <input id="bgm" type="file" accept="audio/*" />
        </section>

        <section class="panel panel--assets">
          <div class="panel__head">
            <div class="panel__title">素材库</div>
            <div class="panel__desc muted">导入素材（当前：多图）</div>
          </div>

          <div class="dropzone" id="dropzone">
            <div class="dropzone__hint">拖拽视频到这里，或用下面按钮选择文件</div>
            <div class="muted" style="font-size:12px;">当前先支持：视频（mp4/mov/mkv/webm）。</div>
          </div>

          <label>视频素材（可多选）</label>
          <input id="videos" type="file" accept="video/*" multiple />

          <div class="asset-list" id="asset_list"></div>

          <details style="margin-top:10px;">
            <summary class="muted" style="cursor:pointer;">图片输入（兼容旧流程，后续会合并进素材库）</summary>
            <label>Images（multiple）</label>
            <input id="images" type="file" accept="image/*" multiple />
          </details>
        </section>
      </aside>

      <section class="main">
        <div class="panel panel--output">
          <div class="panel__head">
            <div>
              <div class="panel__title">输出区</div>
              <div class="panel__desc muted">队列 / 预览 / 导出（占位）</div>
            </div>
            <div class="output-actions">
              <button class="btn" disabled>导出 MP4</button>
              <button class="btn" disabled>导出封面</button>
              <button class="btn" disabled>导出素材包</button>
            </div>
          </div>

          <div class="output-grid">
            <div class="queue">
              <div class="queue__head">任务队列</div>
              <div class="queue__item muted">暂无任务（点击右上角“生成视频”）</div>
              <pre id="log" class="log"></pre>
            </div>

            <div class="preview">
              <div class="preview__head">预览</div>
              <video id="video" controls style="width: 100%; display: none;"></video>
              <div id="preview_placeholder" class="preview__placeholder muted">生成完成后将自动显示预览</div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="/static/app.js"></script>
    <script>
      // Hide placeholder when video becomes visible
      const vid = document.getElementById('video');
      const ph = document.getElementById('preview_placeholder');
      const obs = new MutationObserver(() => {
        if (vid.style.display !== 'none') ph.style.display = 'none';
      });
      obs.observe(vid, { attributes: true, attributeFilter: ['style'] });
    </script>
  </body>
</html>
