<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PetClip Provider Configs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body data-page="providers" class="page-providers">
    <header class="studio-topbar">
      <a class="topbar-back" href="/studio">
        <span>←</span> 返回工作台
      </a>
      <span class="topbar-link topbar-link--current">提供商配置</span>
      <a class="topbar-link" href="/tasks">任务列表</a>
    </header>

    <main class="providers-shell">
      <section class="providers-hero">
        <div class="providers-hero__copy">
          <div class="eyebrow">Jimeng Provider</div>
          <h1>即梦配置中心</h1>
          <p>这里负责管理即梦的凭证、接口地址和联调模式。工作区只会读取这里已经启用并校验通过的配置。</p>
        </div>
        <div class="providers-hero__aside">
          <div class="provider-mini-card">
            <span>当前模式</span>
            <strong>云端异步任务</strong>
            <p>创建任务、轮询状态、聚合分镜、最后合成成片。</p>
          </div>
        </div>
      </section>

      <section class="providers-board">
        <div class="tasks-board__head">
          <h2>即梦配置</h2>
          <button id="providers_refresh" class="btn btn--ghost" type="button">刷新配置</button>
        </div>
        <div id="providers_list" class="providers-list"></div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
