<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PetClip Tasks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body data-page="tasks" class="page-tasks">
    <header class="studio-topbar">
      <a class="topbar-back" href="/studio">
        <span>←</span> 返回工作台
      </a>
      <span class="topbar-link topbar-link--current">任务列表</span>
    </header>

    <main class="tasks-shell">
      <section class="tasks-board">
        <div class="tasks-board__head">
          <h2>最近任务</h2>
          <button id="tasks_refresh" class="btn btn--ghost" type="button">刷新列表</button>
        </div>
        <div id="tasks_list" class="tasks-list"></div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
